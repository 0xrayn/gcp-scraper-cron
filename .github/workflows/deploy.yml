name: Deploy to GCP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run tests
        run: go test ./...

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable Firestore
        run: |
          gcloud firestore databases create --location=asia-southeast1 \
            --project=${{ secrets.GCP_PROJECT_ID }} 2>/dev/null || true

      - name: Deploy Cloud Function
        run: |
          gcloud functions deploy scraper-harian \
            --gen2 \
            --runtime=go121 \
            --region=asia-southeast2 \
            --source=. \
            --entry-point=RunScraper \
            --trigger-http \
            --allow-unauthenticated \
            --timeout=300s \
            --memory=256MB \
            --set-env-vars="TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }},TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }},SCHEDULER_SECRET=${{ secrets.SCHEDULER_SECRET }},GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Cloud Scheduler
        run: |
          FUNCTION_URL=$(gcloud functions describe scraper-harian \
            --region=asia-southeast2 \
            --format='value(serviceConfig.uri)' \
            --project=${{ secrets.GCP_PROJECT_ID }})

          gcloud scheduler jobs update http scraper-harian-job \
            --location=asia-southeast2 \
            --schedule="0 0 * * *" \
            --uri="$FUNCTION_URL" \
            --http-method=GET \
            --headers="X-Scheduler-Secret=${{ secrets.SCHEDULER_SECRET }}" \
            --time-zone="UTC" \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            2>/dev/null || \
          gcloud scheduler jobs create http scraper-harian-job \
            --location=asia-southeast2 \
            --schedule="0 0 * * *" \
            --uri="$FUNCTION_URL" \
            --http-method=GET \
            --headers="X-Scheduler-Secret=${{ secrets.SCHEDULER_SECRET }}" \
            --time-zone="UTC" \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy Dashboard to Cloud Run
        run: |
          gcloud run deploy scraper-dashboard \
            --source=. \
            --dockerfile=cmd/dashboard/Dockerfile \
            --region=asia-southeast2 \
            --allow-unauthenticated \
            --memory=256Mi \
            --set-env-vars="GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Show dashboard URL
        run: |
          gcloud run services describe scraper-dashboard \
            --region=asia-southeast2 \
            --format='value(status.url)' \
            --project=${{ secrets.GCP_PROJECT_ID }}
