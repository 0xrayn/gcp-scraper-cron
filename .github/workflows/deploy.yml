# Deploy otomatis ke GCP Cloud Functions setiap push ke branch main
name: Deploy to GCP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run tests
        run: go test ./...

      # Autentikasi ke GCP menggunakan Service Account key
      # Simpan JSON key di GitHub Secrets dengan nama GCP_SA_KEY
      - name: Auth ke GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # Deploy Cloud Function
      # --trigger-http  : function dipanggil via HTTP (oleh Cloud Scheduler)
      # --allow-unauthenticated : bisa dipanggil tanpa auth GCP (kita pakai secret header sendiri)
      - name: Deploy Cloud Function
        run: |
          gcloud functions deploy scraper-harian \
            --gen2 \
            --runtime=go121 \
            --region=asia-southeast2 \
            --source=. \
            --entry-point=RunScraper \
            --trigger-http \
            --allow-unauthenticated \
            --timeout=300s \
            --memory=256MB \
            --set-env-vars="TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }},TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }},SCHEDULER_SECRET=${{ secrets.SCHEDULER_SECRET }}" \
            --project=${{ secrets.GCP_PROJECT_ID }}

      # Buat/update Cloud Scheduler job
      # Jadwal: setiap hari jam 07:00 WIB (00:00 UTC)
      - name: Setup Cloud Scheduler
        run: |
          FUNCTION_URL=$(gcloud functions describe scraper-harian \
            --region=asia-southeast2 \
            --format='value(serviceConfig.uri)' \
            --project=${{ secrets.GCP_PROJECT_ID }})

          # Coba update dulu, kalau belum ada buat baru
          gcloud scheduler jobs update http scraper-harian-job \
            --location=asia-southeast2 \
            --schedule="0 0 * * *" \
            --uri="$FUNCTION_URL" \
            --http-method=GET \
            --headers="X-Scheduler-Secret=${{ secrets.SCHEDULER_SECRET }}" \
            --time-zone="UTC" \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            2>/dev/null || \
          gcloud scheduler jobs create http scraper-harian-job \
            --location=asia-southeast2 \
            --schedule="0 0 * * *" \
            --uri="$FUNCTION_URL" \
            --http-method=GET \
            --headers="X-Scheduler-Secret=${{ secrets.SCHEDULER_SECRET }}" \
            --time-zone="UTC" \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy sukses!
        run: echo "✅ Scraper berhasil di-deploy dan dijadwalkan!"
